<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GlamAR Fashion VTO</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="sdk/vto.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #ede6d8; color: #1a1a1a; }
  #glamar-vto-root { width: 100%; height: 100vh; }
</style>
</head>
<body>

<div id="glamar-vto-root"></div>

<script src="sdk/vto.js"></script>
<script>
  window.GlamarVTO.init({
    container: '#glamar-vto-root',
    apiKey: 'demo-key',
    defaultPhotoUrl: null, // start with empty "Add a photo" state
    onEvent: (evt) => console.log('[VTO]', evt.type, evt.data),
  });
</script>
</body>
</html>
